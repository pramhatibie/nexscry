name: NexScry Daily Pipeline

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  scrape-enrich-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run full pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py --full

      - name: Save data to repo
        run: |
          git config user.name "NexScry Bot"
          git config user.email "bot@nexscry.xyz"
          git add data/
          git diff --staged --quiet || git commit -m "data: $(date -u +%Y-%m-%d)"
          git push || true

      - name: Add CNAME to docs
        run: echo "nexscry.xyz" > docs/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
