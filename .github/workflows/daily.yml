name: NexScry Daily Pipeline

on:
  schedule:
    # Runs at 06:00 UTC every day (1 PM WIB)
    - cron: '0 6 * * *'
  workflow_dispatch: # Manual trigger button in GitHub UI

permissions:
  contents: write
  pages: write

jobs:
  scrape-enrich-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # No pip install needed — zero external dependencies!
      # Everything uses Python stdlib (urllib, json, re)

      - name: 🌐 Run full pipeline (scrape → AI → build)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python main.py --full

      - name: 📊 Show stats
        run: |
          echo "=== Build Output ==="
          ls -la docs/
          echo ""
          echo "=== Data Files ==="
          ls -la data/ 2>/dev/null || echo "No data dir"
          echo ""
          echo "=== Site Size ==="
          du -sh docs/

      - name: 🚀 Commit & push updates
        run: |
          git config user.name "NexScry Bot"
          git config user.email "bot@nexscry.xyz"
          git add docs/ data/
          git diff --staged --quiet || git commit -m "📡 Daily update: $(date -u +%Y-%m-%d)"
          git push

      - name: 🌐 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
        
